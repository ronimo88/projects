function die(canvas) {
	
	//this.x=x;
	//this.y=y;
	this.canvas = canvas;
	this.ctx = this.canvas.getContext('2d');
	this.num=0; 
	this.hold = false;
	var obj=this;

	this.randomize = function() {
		obj.num = Math.ceil(Math.random()*6);	
	}
	
	this.drawDot = function(x,y) {
		obj.ctx.beginPath();
		obj.ctx.arc(x,y,diceSize/12,0,Math.PI*2);
		obj.ctx.fill();
		obj.ctx.closePath();
	}

	dice.push(this);	
}


function drawObjects() {

	dice.forEach(function(die) {
		die.ctx.clearRect(0,0,die.canvas.width,die.canvas.height);
		
		if (die.num != 0) {
			var fontSize = diceSize*0.5;
			die.ctx.font = "bold " + fontSize + "px Arial";
			die.ctx.textBaseline = "middle";
			die.ctx.textAlign = "center"
			die.ctx.lineWidth = 1;
		
			//let val = document.getElementById("themeSlider").checked;
			
			if (die.hold) die.ctx.fillStyle = "#555";
			else  die.ctx.fillStyle = "white";

			die.ctx.strokeStyle = "black"
			die.ctx.strokeRect(0, 0, diceSize, diceSize);
			die.ctx.font = "Arial 20px";
			
			die.ctx.fillRect(0, 0, diceSize, diceSize);
			die.ctx.fillStyle = 'black';
			if (die.hold) die.ctx.fillStyle = 'white';
			die.ctx.textBaseline = 'middle';
			die.ctx.textAlign = 'center';
			//die.ctx.fillText(die.num, die.x+diceSize/2, die.y+diceSize/2);

			if (die.num == 1) {
				//console.log(1);
				die.drawDot(diceSize/2,diceSize/2);
			}

			if (die.num == 2) {
				//console.log(2);
				die.drawDot(diceSize/4,diceSize/4);
				die.drawDot(diceSize*3/4,diceSize*3/4);
			}
			
			if (die.num == 3) {
				//console.log(3);
				die.drawDot(diceSize*3/4,diceSize/4);
				die.drawDot(diceSize/2,diceSize/2);
				die.drawDot(diceSize/4,diceSize*3/4);
			}

			if (die.num == 4) {
				//console.log(4);
				die.drawDot(diceSize/4,diceSize/4);
				die.drawDot(diceSize*3/4,diceSize*3/4);
				die.drawDot(diceSize*3/4,diceSize/4);
				die.drawDot(diceSize/4,diceSize*3/4);
			}

			if (die.num == 5) {
				//console.log(5);
				die.drawDot(diceSize/2,diceSize/2);
				die.drawDot(diceSize/4,diceSize/4);
				die.drawDot(diceSize*3/4,diceSize*3/4);
				die.drawDot(diceSize*3/4,diceSize/4);
				die.drawDot(diceSize/4,diceSize*3/4);
			}

			if (die.num == 6) {
				//console.log(6);
				die.drawDot(diceSize/4,diceSize/2);
				die.drawDot(diceSize*3/4,diceSize/2);
				die.drawDot(diceSize/4,diceSize/4);
				die.drawDot(diceSize*3/4,diceSize*3/4);
				die.drawDot(diceSize*3/4,diceSize/4);
				die.drawDot(diceSize/4,diceSize*3/4);
			}
		}	
	});

	effects.forEach(function(effect) {
		effect.draw();
	});

	
}

		score += 100;
		scoreBonus += 100;
		document.getElementById('scoreBonusButton').getElementsByTagName('td')[1].innerHTML = scoreBonus;	
	}
	document.getElementById('scoreText').innerHTML = 'Score: ' + score;

}

document.onkeydown = function(e) {
	
	if (!gameEnd && gameActive) {
		if (e.key == 'Backspace') {
			deletePressed();
		}
		
		if (e.key == "Enter") {
			
			enterPressed();
				
		}
	} else if (stats.style.display != "none")  {
		showStats(false);
		
		
	} else if (gameEnd) giveUp();
}



</script>
