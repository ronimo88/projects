<!DOCTYPE html>
<html>

<head>
    <title>Pipes</title>
</head>

<style>
    body {
        font-size: 28px;
        font-family: Arial, Helvetica, sans-serif;
    }

    #header {
        font-size: 36px;
        margin: auto;
        width: fit-content;
    }

    #wrapper {
        width: fit-content;
        margin: 20px auto;
    }

    button {
        font-size: 24px;
    }

    #seed,
    #timer,
    button {
        margin-right: 20px;
        margin-top: 5px;
    }
</style>

<body>
    <div id="wrapper">
        <div id="header">PIPES</div>
        <canvas id="canvas"></canvas>
        <div>
            <span id="seed"></span>
            <span id="timer">0</span>
        </div>
        <div>
            <button id="pause" onclick="game.pause()">PAUSE</button>
            <button onclick="game.reset()">RESET</button>
            <button onclick="game.init()">NEW</button>
        </div>
    </div>
</body>
<script>
    class Cell {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.up = false;
            this.down = false;
            this.left = false;
            this.right = false;
            this.source = false;
            this.filled = false;
            this.connected = false;
            game.cells.push(this);
            this.checkCells();
        }
        getNum() {
            return this.up + this.down + this.left + this.right;
        }
        checkCells() {
            let cellLeft = false;
            let cellRight = false;
            let cellUp = false;
            let cellDown = false;
            if (game.sourceNum == game.cells.indexOf(this)) {
                this.source = true;
            }
            if (this.source) {
                const dirs = ["left", "right", "up", "down"];
                let dir = dirs[Math.floor(Math.random() * dirs.length)];
                if (this.x == 0 && dir == "left") dir = "right";
                if (this.y == 0 && dir == "up") dir = "down";
                if (this.x == game.canvas.width - game.cellSize && dir == "right") dir = "left";
                if (this.y == game.canvas.height - game.cellSize && dir == "down") dir = "up";
                if (dir == "left") this.left = true;
                if (dir == "right") this.right = true;
                if (dir == "up") this.up = true;
                if (dir == "down") this.down = true;
                game.cells.forEach(other => {
                    if (this.x == other.x + game.cellSize && this.y == other.y) {
                        if (this.left) other.right = true;
                        else other.right = false;
                    }
                    if (this.x == other.x - game.cellSize && this.y == other.y) {
                        if (this.right) other.left = true;
                        else other.left = false;
                    }
                    if (this.y == other.y + game.cellSize && this.x == other.x) {
                        if (this.up) other.down = true;
                        else other.down = false;
                    }
                    if (this.y == other.y - game.cellSize && this.x == other.x) {
                        if (this.down) other.up = true;
                        else other.up = false;
                    }
                });
            } else {
                game.cells.forEach(other => {
                    if (this.x == other.x + game.cellSize && this.y == other.y) {
                        cellLeft = true;
                        if (other.right) {
                            this.left = true;
                            this.connected = true;
                        }
                    }
                    if (this.x == other.x - game.cellSize && this.y == other.y) {
                        cellRight = true;
                        if (other.left) {
                            this.right = true;
                            this.connected = true;
                        }
                    }
                    if (this.y == other.y + game.cellSize && this.x == other.x) {
                        cellUp = true;
                        if (other.down) {
                            this.up = true;
                            this.connected = true;
                        }
                    }
                    if (this.y == other.y - game.cellSize && this.x == other.x) {
                        cellDown = true;
                        if (other.up) {
                            this.down = true;
                            this.connected = true;
                        }
                    }
                });
                if (!cellLeft && this.x != 0 && this.getNum() < 3) {
                    this.left = game.rand() < 0.5;
                }
                if (!cellRight && this.x != game.canvas.width - game.cellSize && this.getNum() < 3) {
                    this.right = game.rand() < 0.5;
                }
                if (!cellUp && this.y != 0 && this.getNum() < 3) {
                    this.up = game.rand() < 0.5;
                }
                if (!cellDown && this.y != game.canvas.height - game.cellSize && this.getNum() < 3) {
                    this.down = game.rand() < 0.5;
                }
            }
            this.checkFilled();
        }
        click(button) {
            if (!game.win && !this.locked && !game.paused) {
                if (button == 1) {
                    let temp = this.up;
                    this.up = this.right;
                    this.right = this.down;
                    this.down = this.left;
                    this.left = temp;
                } else if (button == 3) {
                    let temp = this.up;
                    this.up = this.left;
                    this.left = this.down;
                    this.down = this.right;
                    this.right = temp;
                }
                game.cells.forEach(cell => {
                    cell.filled = false;
                });
                game.cells.forEach(cell => {
                    cell.checkFilled();
                });
                game.checkWin();
            }
        }
        checkFilled() {
            const currentFilled = this.filled;
            if (this.x != 0 || this.y != 0) this.filled = false;
            game.cells.forEach(cell => {
                if (this.left && this.x == cell.x + game.cellSize && this.y == cell.y) {
                    if (cell.right && (cell.filled || cell.source)) this.filled = true;
                }
                if (this.right && this.x == cell.x - game.cellSize && this.y == cell.y) {
                    if (cell.left && (cell.filled || cell.source)) this.filled = true;
                }
                if (this.up && this.y == cell.y + game.cellSize && this.x == cell.x) {
                    if (cell.down && (cell.filled || cell.source)) this.filled = true;
                }
                if (this.down && this.y == cell.y - game.cellSize && this.x == cell.x) {
                    if (cell.up && (cell.filled || cell.source)) this.filled = true;
                }
            });
            if (this.filled && !currentFilled) {
                game.cells.forEach(cell => {
                    cell.checkFilled();
                })
            }
            this.draw();
        }
        shuffle() {
            const max = Math.floor(Math.random() * 3);
            for (var i = 0; i <= max; i++) {
                this.click(1);
            }
        }
        draw() {
            game.ctx.clearRect(this.x, this.y, game.cellSize, game.cellSize);
            if (this.locked) {
                game.ctx.fillStyle = "yellow";
                game.ctx.fillRect(this.x, this.y, game.cellSize, game.cellSize);
            }
            if (game.win) {
                game.ctx.fillStyle = "lime";
                game.ctx.fillRect(this.x, this.y, game.cellSize, game.cellSize);
            }
            game.ctx.strokeStyle = "black";
            game.ctx.lineWidth = 2;
            game.ctx.strokeRect(this.x + 1, this.y + 1, game.cellSize - 2, game.cellSize - 2);
            game.ctx.fillStyle = "#555";
            if (this.filled || this.source) game.ctx.fillStyle = "#0060ff";
            if (this.getNum() == 1 && !this.source) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.pipeSize * 1 / 2, 0, 2 * Math.PI);
                game.ctx.fill();
            }
            if (this.getNum() > 1) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.pipeSize / 2, 0, 2 * Math.PI);
                game.ctx.fill();
            }
            if (this.up) {
                game.ctx.fillRect(this.x + game.cellSize / 2 - game.pipeSize / 2, this.y, game.pipeSize, game.cellSize / 2);
            }
            if (this.down) {
                game.ctx.fillRect(this.x + game.cellSize / 2 - game.pipeSize / 2, this.y + game.cellSize / 2, game.pipeSize, game.cellSize / 2);
            }
            if (this.left) {
                game.ctx.fillRect(this.x, this.y + game.cellSize / 2 - game.pipeSize / 2, game.cellSize / 2, game.pipeSize);
            }
            if (this.right) {
                game.ctx.fillRect(this.x + game.cellSize / 2, this.y + game.cellSize / 2 - game.pipeSize / 2, game.cellSize / 2, game.pipeSize);
            }
            if (this.source) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.pipeSize * 3 / 4, 0, 2 * Math.PI);
                game.ctx.fill();
            }
        }
    }
    const game = {
        init() {
            this.seed = Math.floor(Math.random() * 1000000);
            this.rand = this.mulberry32(this.seed);
            this.cells = [];
            this.canvas = document.getElementById("canvas");
            this.canvas.style.backgroundColor = "#f0f0f0";
            this.canvas.style.borderStyle = "solid";
            this.canvas.width = 500;
            this.canvas.height = 500;
            this.ctx = this.canvas.getContext("2d");
            this.numRows = 5;
            this.canvas.width = Math.floor(this.canvas.width / this.numRows) * this.numRows;
            this.canvas.height = Math.floor(this.canvas.height / this.numRows) * this.numRows;
            this.cellSize = this.canvas.width / this.numRows;
            this.pipeSize = this.cellSize * 0.4;
            this.win = false;
            this.sourceNum = Math.floor(this.rand() * this.numRows * this.numRows);
            this.paused = false;
            for (i = 0; i <= this.numRows - 1; i++) {
                for (j = 0; j <= this.numRows - 1; j++) {
                    this.cell = new Cell(this.cellSize * i, this.cellSize * j);
                }
            }
            this.cells.forEach(cell => {
                cell.checkFilled();
            });
            this.checkAllFilledCreate();
            game.cells.forEach(cell => {
                cell.leftStart = cell.left;
                cell.rightStart = cell.right;
                cell.upStart = cell.up;
                cell.downStart = cell.down;
            });
            this.cells.forEach(cell => {
                cell.shuffle();
                cell.draw();
            });
            this.canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });
            this.canvas.onmousedown = e => {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                if (e.which == 1 || e.which == 3) {
                    this.cells.forEach(cell => {
                        if (x >= cell.x && x <= cell.x + game.cellSize && y >= cell.y && y <= cell.y + game.cellSize) {
                            cell.click(e.which);
                        }
                    });
                }
                if (e.which == 2) {
                    this.cells.forEach(cell => {
                        if (x >= cell.x && x <= cell.x + game.cellSize && y >= cell.y && y <= cell.y + game.cellSize) {
                            cell.locked = !cell.locked;
                            cell.draw();
                        }
                    });
                }
            }
            document.getElementById("seed").innerHTML = "SEED: " + this.seed;
            this.startTimer();
        },
        reset() {
            this.win = false;
            this.paused = false;
            document.getElementById("pause").innerHTML = "PAUSE";
            this.cells.forEach(cell => {
                cell.left = cell.leftStart;
                cell.right = cell.rightStart;
                cell.up = cell.upStart;
                cell.down = cell.downStart;
                cell.locked = false;
            });
            this.cells.forEach(cell => {
                cell.shuffle();
                cell.checkFilled();
                cell.draw();
            });
            this.startTimer();
        },
        startTimer() {
            clearInterval(this.timeInterval);
            this.timeInterval = null;
            this.time = 0;
            this.timeInterval = setInterval(() => {
                if (!game.paused) this.time += .01;
                document.getElementById("timer").innerHTML = "TIME: " + this.time.toFixed(2);
            }, 10);
        },
        mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        },
        checkAllFilledCreate() {
            let allfilled = true;
            this.cells.forEach(cell => {
                this.cells.forEach(other => {
                    if (!cell.filled) {
                        allfilled = false;
                        if (other.filled && !other.source && other.getNum() < 3 && cell.x == other.x + this.cellSize && cell.y == other.y) {
                            cell.left = true;
                            other.right = true;
                        }
                        else if (other.filled && !other.source && other.getNum() < 3 && cell.x == other.x - this.cellSize && cell.y == other.y) {
                            cell.right = true;
                            other.left = true;
                        }
                        else if (other.filled && !other.source && other.getNum() < 3 && cell.y == other.y + this.cellSize && cell.x == other.x) {
                            cell.up = true;
                            other.down = true;
                        }
                        else if (other.filled && !other.source && other.getNum() < 3 && cell.y == other.y - this.cellSize && cell.x == other.x) {
                            cell.down = true;
                            other.up = true;
                        }
                        this.cells.forEach(c => {
                            c.checkFilled();
                        });
                    }
                });
                this.cells.forEach(c => {
                    c.checkFilled();
                });
            });
            if (!allfilled) {
                this.checkAllFilledCreate();
            }
        },
        checkWin() {
            let win = true;
            this.cells.forEach(cell => {
                if (!cell.filled) win = false;
                this.cells.forEach(other => {
                    if (cell.left && !other.right && cell.x == other.x + this.cellSize && cell.y == other.y) {
                        win = false;
                    }
                    if (cell.right && !other.left && cell.x == other.x - this.cellSize && cell.y == other.y) {
                        win = false;
                    }
                    if (cell.up && !other.down && cell.x == other.x && cell.y == other.y + this.cellSize) {
                        win = false;
                    }
                    if (cell.down && !other.up && cell.x == other.x && cell.y == other.y - this.cellSize) {
                        win = false;
                    }
                })
            });
            if (win) {
                this.win = true;
                this.cells.forEach(cell => {
                    cell.draw();
                });
                clearInterval(this.timeInterval);
                this.timeInterval = null;
            }
        },
        pause() {
            if (!this.win) {
                this.paused = !this.paused;
                if (this.paused) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    document.getElementById("pause").innerHTML = "RESUME";
                    this.ctx.textAlign = "center";
                    this.ctx.textBaseline = "middle";
                    this.ctx.font = "32px Arial ";
                    this.ctx.fillStyle = "black";
                    this.ctx.fillText("PAUSED", this.canvas.width / 2, this.canvas.height / 2);
                    this.ctx.textAlign = "left";
                    this.ctx.textBaseline = "top"
                } else {
                    this.cells.forEach(cell => {
                        cell.draw();
                        document.getElementById("pause").innerHTML = "PAUSE";
                    });
                }
            }
        }
    }
    game.init();
</script>

</html>
