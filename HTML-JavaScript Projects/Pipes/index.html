<!DOCTYPE html>
<html>

<head>
    <title>Pipes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="header">
        <h2>PIPES</h2>
    </header>

    <main id="wrapper">
        <section class="controls-group">
            <div class="field">
                <label for="size">SIZE</label>
                <select id="size" onchange="game.boardSizeChange(this.value)">
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>

                <label for="sources">SOURCES</label>
                <select id="sources" onchange="game.numSourcesChange(this.value)">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </div>

            <form id="seed_form" onsubmit="game.seedSelect(); return false">
                <label for="seed_input">SEED</label>
                <input id="seed_input" type="number" min="1" max="999999999" placeholder="Enter Seed">
                <button type="submit" class="btn-primary">GO</button>
                <button type="button" onclick="game.random()">RANDOM</button>
            </form>


        </section>

        <div class="game-info">
            <span id="seed_display">Seed: None</span>
            <span id="timer">TIME: 00:00.00</span>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <footer class="actions">
            <button id="pause" onclick="game.pause()">PAUSE</button>
            <button class="btn-danger" onclick="game.reset()">RESET</button>
        </footer>
    </main>
</body>


<script src="cell.js"></script>
<script src="scripts.js"></script>

</html>
