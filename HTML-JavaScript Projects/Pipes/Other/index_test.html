<!DOCTYPE html>
<html>
<head>
<style>
    #wrapper {
        width: fit-content;
        margin: 20px auto;
    }
    body { font-size: 28px; }
    button { font-size: 24px; }
    #seed, #timer, button {
        margin-right: 20px;
        margin-top: 5px;
    }
</style>
</head>

<body>
<div id="wrapper">
    <canvas id="canvas"></canvas>

    <div>
        <span id="seed"></span>
        <span id="timer">0</span>
    </div>

    <div>
        <button id="newBtn">NEW</button>
        <button id="resetBtn">RESET</button>
    </div>
</div>

<script>
const CELL_SIZE = 100;
const GRID_SIZE = 5;
const PIPE_SIZE = 40;

const DIRS = {
    up:    { dx: 0, dy: -1, opposite: "down" },
    down:  { dx: 0, dy: 1,  opposite: "up" },
    left:  { dx: -1, dy: 0, opposite: "right" },
    right: { dx: 1, dy: 0,  opposite: "left" }
};

class Cell {
    constructor(game, x, y) {
        this.game = game;
        this.x = x;
        this.y = y;

        this.connections = { up:false, down:false, left:false, right:false };
        this.source = (x === 0 && y === 0);
        this.filled = this.source;
    }

    getNum() {
        return Object.values(this.connections).filter(Boolean).length;
    }

    rotate() {
        const { up, right, down, left } = this.connections;
        this.connections.up = left;
        this.connections.right = up;
        this.connections.down = right;
        this.connections.left = down;
    }

    click() {
        if (this.game.win) return;
        this.rotate();
        this.game.recalculateFlow();
        this.game.checkWin();
        this.game.draw();
    }

    draw(ctx) {
        const px = this.x * CELL_SIZE;
        const py = this.y * CELL_SIZE;

        ctx.clearRect(px, py, CELL_SIZE, CELL_SIZE);

        ctx.strokeStyle = "black";
        ctx.strokeRect(px+1, py+1, CELL_SIZE-2, CELL_SIZE-2);

        ctx.fillStyle = (this.filled || this.source) ? "#0060ff" : "#333";

        const cx = px + CELL_SIZE/2;
        const cy = py + CELL_SIZE/2;

        const count = this.getNum();

        ctx.beginPath();
        ctx.arc(cx, cy, count === 1 ? PIPE_SIZE*0.75 : PIPE_SIZE/2, 0, Math.PI*2);
        ctx.fill();

        if (this.connections.up)
            ctx.fillRect(cx - PIPE_SIZE/2, py, PIPE_SIZE, CELL_SIZE/2);

        if (this.connections.down)
            ctx.fillRect(cx - PIPE_SIZE/2, cy, PIPE_SIZE, CELL_SIZE/2);

        if (this.connections.left)
            ctx.fillRect(px, cy - PIPE_SIZE/2, CELL_SIZE/2, PIPE_SIZE);

        if (this.connections.right)
            ctx.fillRect(cx, cy - PIPE_SIZE/2, CELL_SIZE/2, PIPE_SIZE);
    }
}

const game = {
    init() {
        this.seed = Math.floor(Math.random() * 1e6);
        this.rand = this.mulberry32(this.seed);

        this.canvas = document.getElementById("canvas");
        this.canvas.width = CELL_SIZE * GRID_SIZE;
        this.canvas.height = CELL_SIZE * GRID_SIZE;
        this.ctx = this.canvas.getContext("2d");

        this.win = false;

        // Build grid
        this.grid = [];
        this.cells = [];

        for (let y = 0; y < GRID_SIZE; y++) {
            this.grid[y] = [];
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = new Cell(this, x, y);
                this.grid[y][x] = cell;
                this.cells.push(cell);
            }
        }

        this.generateSolution();
        this.saveStartState();
        this.shuffle();

        this.recalculateFlow();
        this.draw();

        this.canvas.onclick = (e) => this.handleClick(e);

        document.getElementById("seed").textContent = "SEED: " + this.seed;

        this.startTimer();
    },

    getCell(x, y) {
        return this.grid[y]?.[x];
    },

    getNeighbor(cell, dir) {
        const d = DIRS[dir];
        return this.getCell(cell.x + d.dx, cell.y + d.dy);
    },

    generateSolution() {
        // Grow from source
        let queue = [this.getCell(0,0)];
        let visited = new Set([queue[0]]);

        while (queue.length) {
            const cell = queue.shift();

            for (const dir in DIRS) {
                const neighbor = this.getNeighbor(cell, dir);
                if (!neighbor || visited.has(neighbor)) continue;

                if (this.rand() < 0.5) {
                    cell.connections[dir] = true;
                    neighbor.connections[DIRS[dir].opposite] = true;

                    visited.add(neighbor);
                    queue.push(neighbor);
                }
            }
        }
    },

    saveStartState() {
        this.cells.forEach(c => {
            c.start = { ...c.connections };
        });
    },

    shuffle() {
        this.cells.forEach(c => {
            const turns = Math.floor(Math.random() * 4);
            for (let i=0;i<turns;i++) c.rotate();
        });
    },

    recalculateFlow() {
        this.cells.forEach(c => c.filled = false);

        const start = this.getCell(0,0);
        start.filled = true;

        const queue = [start];

        while (queue.length) {
            const cell = queue.shift();

            for (const dir in DIRS) {
                if (!cell.connections[dir]) continue;

                const n = this.getNeighbor(cell, dir);
                if (!n) continue;

                if (n.connections[DIRS[dir].opposite] && !n.filled) {
                    n.filled = true;
                    queue.push(n);
                }
            }
        }
    },

    handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
        const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);

        const cell = this.getCell(x,y);
        if (cell) cell.click();
    },

    draw() {
        this.cells.forEach(c => c.draw(this.ctx));
    },

    checkWin() {
        if (this.cells.every(c => c.filled)) {
            this.win = true;
            clearInterval(this.timer);

            setTimeout(() => alert("You Win!"), 100);
        }
    },

    reset() {
        this.win = false;

        this.cells.forEach(c => {
            c.connections = { ...c.start };
        });

        this.shuffle();
        this.recalculateFlow();
        this.draw();

        this.startTimer();
    },

    startTimer() {
        clearInterval(this.timer);
        this.time = 0;

        this.timer = setInterval(() => {
            this.time += 0.01;
            document.getElementById("timer").textContent =
                "TIME: " + this.time.toFixed(2);
        }, 10);
    },

    mulberry32(a) {
        return function () {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }
};

document.getElementById("newBtn").onclick = () => game.init();
document.getElementById("resetBtn").onclick = () => game.reset();

game.init();
</script>
</body>
</html>
