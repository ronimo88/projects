<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pipes Pro</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --pipe-gray: #555;
            --win-bg: #ccffcc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #wrapper {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: fit-content;
        }
        #header { font-size: 32px; font-weight: bold; margin-bottom: 15px; text-align: center; color: #333; }
        .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .control-group { display: flex; align-items: center; gap: 8px; }
        button, select, input {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #e9ecef; }
        #canvas { 
            border: 2px solid #333; 
            border-radius: 4px;
            display: block;
            cursor: pointer;
        }
        #win_text { 
            height: 40px; 
            font-size: 24px; 
            color: #28a745; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 10px; 
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="header">PIPES</div>
    
    <div class="controls">
        <div class="control-group">
            <label>Size:</label>
            <select id="sizeSelect"></select>
        </div>
        <div class="control-group">
            <label>Sources:</label>
            <select id="sourceSelect"></select>
        </div>
        <div class="control-group">
            <input id="seedInput" type="number" placeholder="Seed">
            <button id="goBtn">GO</button>
        </div>
        <button id="randBtn">RANDOM NEW</button>
    </div>

    <div class="stats">
        <div id="seedDisplay">SEED: -</div>
        <div id="timer">TIME: 0.00</div>
    </div>

    <div class="controls">
        <button id="pauseBtn">PAUSE</button>
        <button id="resetBtn">RESET</button>
    </div>

    <canvas id="canvas"></canvas>
    <div id="win_text"></div>
</div>

<script>
class Cell {
    constructor(r, c, size) {
        this.r = r;
        this.c = c;
        this.size = size;
        this.up = false; this.down = false; this.left = false; this.right = false;
        this.source = 0;
        this.filled = 0;
        this.locked = false;
        // Store original state for reset
        this.startState = null;
    }

    get connections() { return (this.up?1:0) + (this.down?1:0) + (this.left?1:0) + (this.right?1:0); }

    rotate(clockwise = true) {
        const { up, right, down, left } = this;
        if (clockwise) {
            [this.up, this.right, this.down, this.left] = [left, up, right, down];
        } else {
            [this.up, this.right, this.down, this.left] = [right, down, left, up];
        }
    }

    saveStart() {
        this.startState = { up: this.up, down: this.down, left: this.left, right: this.right };
    }

    reset() {
        if (this.startState) {
            Object.assign(this, this.startState);
            this.locked = false;
        }
    }
}

const Game = {
    colors: ["#555", "#0060ff", "#008800", "#ff0000", "#ffa500", "#800080"],
    
    init() {
        this.canvas = document.getElementById("canvas");
        this.ctx = this.canvas.getContext("2d");
        this.sizeSelect = document.getElementById("sizeSelect");
        this.sourceSelect = document.getElementById("sourceSelect");
        
        // Setup dropdowns
        for(let i=3; i<=15; i++) this.sizeSelect.add(new Option(i, i));
        for(let i=1; i<=5; i++) this.sourceSelect.add(new Option(i, i));
        this.sizeSelect.value = 6;

        // Event Listeners
        document.getElementById("randBtn").onclick = () => this.newGame();
        document.getElementById("goBtn").onclick = () => this.newGame(document.getElementById("seedInput").value);
        document.getElementById("resetBtn").onclick = () => this.resetBoard();
        document.getElementById("pauseBtn").onclick = () => this.togglePause();
        
        this.canvas.onmousedown = (e) => this.handleClick(e);
        this.canvas.oncontextmenu = (e) => e.preventDefault();

        this.newGame();
        this.animate();
    },

    newGame(seed) {
        this.seed = seed || Math.floor(Math.random() * 999999);
        this.rand = this.mulberry32(this.seed);
        this.gridSize = parseInt(this.sizeSelect.value);
        this.numSources = parseInt(this.sourceSelect.value);
        this.cellSize = 500 / this.gridSize;
        this.canvas.width = this.canvas.height = 500;
        
        this.grid = Array.from({length: this.gridSize}, (_, r) => 
            Array.from({length: this.gridSize}, (_, c) => new Cell(r, c, this.cellSize))
        );

        this.generateLevel();
        this.shuffleLevel();
        
        this.isWin = false;
        this.isPaused = false;
        this.startTime = Date.now();
        document.getElementById("seedDisplay").innerText = `SEED: ${this.seed}`;
        document.getElementById("win_text").innerText = "";
    },

    generateLevel() {
        // Place sources
        let sourcesPlaced = 0;
        while(sourcesPlaced < this.numSources) {
            let r = Math.floor(this.rand() * this.gridSize);
            let c = Math.floor(this.rand() * this.gridSize);
            if(this.grid[r][c].source === 0) {
                this.grid[r][c].source = sourcesPlaced + 1;
                sourcesPlaced++;
            }
        }

        // Simple DFS-based growth to ensure connectivity
        const stack = [];
        this.grid.flat().filter(c => c.source > 0).forEach(s => stack.push(s));

        while(stack.length > 0) {
            let curr = stack[Math.floor(this.rand() * stack.length)];
            let neighbors = this.getNeighbors(curr.r, curr.c).filter(n => n.cell.connections === 0 && n.cell.source === 0);
            
            if(neighbors.length === 0) {
                stack.splice(stack.indexOf(curr), 1);
                continue;
            }

            let next = neighbors[Math.floor(this.rand() * neighbors.length)];
            this.connectCells(curr, next.cell, next.dir);
            stack.push(next.cell);
        }
    },

    getNeighbors(r, c) {
        const res = [];
        if (r > 0) res.push({cell: this.grid[r-1][c], dir: 'up'});
        if (r < this.gridSize-1) res.push({cell: this.grid[r+1][c], dir: 'down'});
        if (c > 0) res.push({cell: this.grid[r][c-1], dir: 'left'});
        if (c < this.gridSize-1) res.push({cell: this.grid[r][c+1], dir: 'right'});
        return res;
    },

    connectCells(c1, c2, dir) {
        if(dir === 'up') { c1.up = true; c2.down = true; }
        if(dir === 'down') { c1.down = true; c2.up = true; }
        if(dir === 'left') { c1.left = true; c2.right = true; }
        if(dir === 'right') { c1.right = true; c2.left = true; }
    },

    shuffleLevel() {
        this.grid.flat().forEach(cell => {
            const rotations = Math.floor(Math.random() * 4);
            for(let i=0; i<rotations; i++) cell.rotate();
            cell.saveStart();
        });
        this.updateFlow();
    },

    updateFlow() {
        const flat = this.grid.flat();
        flat.forEach(c => c.filled = c.source);
        
        let changed = true;
        while(changed) {
            changed = false;
            flat.forEach(c => {
                if (c.filled !== 0) {
                    this.getNeighbors(c.r, c.c).forEach(n => {
                        if (n.cell.filled === 0 && this.isMatching(c, n.cell, n.dir)) {
                            n.cell.filled = c.filled;
                            changed = true;
                        }
                    });
                }
            });
        }
    },

    isMatching(c1, c2, dir) {
        if (dir === 'up') return c1.up && c2.down;
        if (dir === 'down') return c1.down && c2.up;
        if (dir === 'left') return c1.left && c2.right;
        if (dir === 'right') return c1.right && c2.left;
        return false;
    },

    checkWin() {
        const flat = this.grid.flat();
        const allConnected = flat.every(c => {
            if (c.connections === 0) return true;
            if (c.filled === 0) return false;
            // Check if any pipe lead to a dead end or off-screen
            if (c.up && (c.r === 0 || !this.grid[c.r-1][c].down)) return false;
            if (c.down && (c.r === this.gridSize-1 || !this.grid[c.r+1][c].up)) return false;
            if (c.left && (c.c === 0 || !this.grid[c.r][c-1].right)) return false;
            if (c.right && (c.c === this.gridSize-1 || !this.grid[c.r][c+1].left)) return false;
            return true;
        });

        if (allConnected) {
            this.isWin = true;
            document.getElementById("win_text").innerText = "YOU WIN!";
        }
    },

    handleClick(e) {
        if (this.isWin || this.isPaused) return;
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const c = Math.floor(x / this.cellSize);
        const r = Math.floor(y / this.cellSize);
        
        const cell = this.grid[r][c];
        if (e.button === 0) cell.rotate(true);      // Left Click: Clockwise
        if (e.button === 2) cell.rotate(false);     // Right Click: Anti-clockwise
        if (e.button === 1) cell.locked = !cell.locked; // Middle Click: Lock
        
        this.updateFlow();
        this.checkWin();
    },

    togglePause() {
        this.isPaused = !this.isPaused;
        document.getElementById("pauseBtn").innerText = this.isPaused ? "RESUME" : "PAUSE";
    },

    resetBoard() {
        this.grid.flat().forEach(c => c.reset());
        this.isWin = false;
        this.startTime = Date.now();
        this.updateFlow();
    },

    mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5;
          t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61);
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    },

    animate() {
        this.render();
        if (!this.isWin && !this.isPaused) {
            const elapsed = (Date.now() - this.startTime) / 1000;
            document.getElementById("timer").innerText = `TIME: ${elapsed.toFixed(2)}`;
        }
        requestAnimationFrame(() => this.animate());
    },

    render() {
        const { ctx, canvas, gridSize, cellSize } = this;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (this.isPaused) {
            ctx.fillStyle = "black";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);
            return;
        }

        this.grid.flat().forEach(cell => {
            const x = cell.c * cellSize;
            const y = cell.r * cellSize;

            // Background
            ctx.fillStyle = cell.locked ? "#fff9c4" : (this.isWin ? "#e8f5e9" : "#fff");
            ctx.fillRect(x, y, cellSize, cellSize);
            
            // Border
            ctx.strokeStyle = "#ddd";
            ctx.strokeRect(x, y, cellSize, cellSize);

            // Pipe Setup
            ctx.lineWidth = cellSize * 0.15;
            ctx.lineCap = "round";
            ctx.strokeStyle = this.colors[cell.filled] || this.colors[0];
            
            const midX = x + cellSize / 2;
            const midY = y + cellSize / 2;

            // Draw Source Hub
            if (cell.source > 0) {
                ctx.beginPath();
                ctx.arc(midX, midY, cellSize * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = this.colors[cell.source];
                ctx.fill();
            } else if (cell.connections === 1) {
                // End cap
                ctx.beginPath();
                ctx.arc(midX, midY, cellSize * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
            }

            // Draw Lines
            ctx.beginPath();
            if (cell.up) { ctx.moveTo(midX, midY); ctx.lineTo(midX, y); }
            if (cell.down) { ctx.moveTo(midX, midY); ctx.lineTo(midX, y + cellSize); }
            if (cell.left) { ctx.moveTo(midX, midY); ctx.lineTo(x, midY); }
            if (cell.right) { ctx.moveTo(midX, midY); ctx.lineTo(x + cellSize, midY); }
            ctx.stroke();
        });
    }
};

Game.init();

</script>
</body>
</html>
