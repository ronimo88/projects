<!DOCTYPE html>
<html>

<head>
    <title>Pipes</title>
</head>

<style>
    :root {
        --bg-color: #f0f0f0;
        --panel-color: #ffffff;
        --accent-color: #4a90e2;
        --danger-color: #e74c3c;
        --text-color: #333;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    #header h2 {
        font-size: 42px;
        margin: 0 0 20px 0;
        letter-spacing: 4px;
        color: var(--accent-color);
    }

    #wrapper {
        background-color: var(--panel-color);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
        /* Consistent spacing between all sections */
        width: fit-content;
    }

    /* Common style for the rows above/below the canvas */
    .controls-group,
    .meta-group,
    .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
    }

    /* Input Styling */
    select,
    input,
    button {
        padding: 6px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        outline: none;
    }

    #seed_input {
        width: 100px;
    }

    #seed_display {
        margin-right:15px;
    }

    button {
        cursor: pointer;
        background-color: #eee;
        transition: all 0.2s;
    }

    button:hover {
        background-color: #ddd;
    }

    .btn-primary {
        background-color: var(--accent-color);
        color: white;
        border: none;
    }

    .btn-danger {
        background-color: var(--danger-color);
        color: white;
        border: none;
    }

    /* Info Display */
    .game-info {
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        background: #e8f4ff;
        padding: 10px;
        border-radius: 8px;
        flex-grow: 1;
        text-align: center;
    }

    #canvas {
        background-color: #222;
        border-radius: 8px;
        display: block;
        /* Removes weird bottom spacing */
    }
</style>

<body>
    <header id="header">
        <h2>PIPES</h2>
    </header>

    <main id="wrapper">
        <section class="controls-group">
            <div class="field">
                <label for="size">Size</label>
                <select id="size" onchange="game.boardSizeChange(this.value)">
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>

            <div class="field">
                <label for="sources">Sources</label>
                <select id="sources" onchange="game.numSourcesChange(this.value)">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </div>
        </section>

        <section class="meta-group">
            <form id="seed_form" onsubmit="game.seedSelect(); return false">
                <label for="seed_input">SEED</label>
                <input id="seed_input" type="number" min="1" max="999999999" placeholder="Enter Seed">
                <button type="submit" class="btn-primary">GO</button>
                <button type="button" onclick="game.random()">RANDOM</button>
            </form>

            <div class="game-info">
                <span id="seed_display">Seed: None</span>
                <span id="timer">TIME: 00:00.00</span>
            </div>
        </section>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <footer class="actions">
            <button id="pause" onclick="game.pause()">PAUSE</button>
            <button class="btn-danger" onclick="game.reset()">RESET</button>
        </footer>
    </main>
</body>

<script>
    class Cell {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.up = false;
            this.down = false;
            this.left = false;
            this.right = false;
            this.source = 0;
            this.filled = 0;
            this.connected = false;
            game.cells.push(this);
            this.checkCells();
        }
        getNum() {
            return this.up + this.down + this.left + this.right;
        }
        checkCells() {

            let cellLeft = false;
            let cellRight = false;
            let cellUp = false;
            let cellDown = false;

            if (game.sourceNum1 == game.cells.indexOf(this)) {
                this.source = 1;
            }

            if (game.sourceNum2 == game.cells.indexOf(this)) {
                this.source = 2;
            }

            if (game.sourceNum3 == game.cells.indexOf(this)) {
                this.source = 3;
            }

            if (game.sourceNum4 == game.cells.indexOf(this)) {
                this.source = 4;
            }

            if (game.sourceNum5 == game.cells.indexOf(this)) {
                this.source = 5;
            }


            this.filled = this.source;

            if (this.source != 0) {
                const dirs = ["left", "right", "up", "down"];
                let dir = dirs[Math.floor(game.rand() * dirs.length)];
                if (this.x == 0 && dir == "left") dir = "right";
                if (this.y == 0 && dir == "up") dir = "down";
                if (this.x == game.canvas.width - game.cellSize && dir == "right") dir = "left";
                if (this.y == game.canvas.height - game.cellSize && dir == "down") dir = "up";
                if (dir == "left") this.left = true;
                if (dir == "right") this.right = true;
                if (dir == "up") this.up = true;
                if (dir == "down") this.down = true;
                game.cells.forEach(other => {

                    other.checkFilled();
                    if (this.x == other.x + game.cellSize && this.y == other.y) {
                        if (this.left && (this.source == other.filled || other.filled == 0)) {
                            other.right = true;
                            this.connected = true;
                        }
                        else {
                            this.left = false;
                            other.right = false;
                        }
                    }

                    other.checkFilled();
                    if (this.x == other.x - game.cellSize && this.y == other.y) {
                        if (this.right && (this.source == other.filled || other.filled == 0)) {
                            other.left = true;
                            this.connected = true;
                        }
                        else {
                            this.right = false;
                            other.left = false;
                        }
                    }

                    other.checkFilled();
                    if (this.y == other.y + game.cellSize && this.x == other.x) {


                        if (this.up && (this.source == other.filled || other.filled == 0)) {
                            other.down = true;
                            this.connected = true;
                        }
                        else {
                            this.up = false;
                            other.down = false;
                        }
                    }

                    other.checkFilled();
                    if (this.y == other.y - game.cellSize && this.x == other.x) {
                        if (this.down && (this.source == other.filled || other.filled == 0)) {
                            other.up = true;
                            this.connected = true;


                        }
                        else {
                            this.down = false;
                            other.up = false;
                        }
                    }
                });
            } else {

                game.cells.forEach(other => {

                    this.checkFilled();

                    if (this.x == other.x + game.cellSize && this.y == other.y) {

                        cellLeft = true;
                        if (other.right) {
                            if (this.filled == 0) {
                                this.left = true;
                                this.connected = true;
                            } else {
                                other.right = false;
                            }
                        }
                    }

                    this.checkFilled();

                    if (this.x == other.x - game.cellSize && this.y == other.y) {

                        cellRight = true;
                        if (other.left) {
                            if (this.filled == 0) {
                                this.right = true;
                                this.connected = true;
                            } else {
                                other.left = false;
                            }
                        }
                    }

                    this.checkFilled();

                    if (this.y == other.y + game.cellSize && this.x == other.x) {
                        cellUp = true;
                        if (other.down) {
                            if (this.filled == 0) {
                                this.up = true;
                                this.connected = true;
                            } else {
                                other.down = false;
                            }
                        }
                    }

                    this.checkFilled();

                    if (this.y == other.y - game.cellSize && this.x == other.x) {
                        cellDown = true;
                        if (other.up) {
                            if (this.filled == 0) {
                                this.down = true;
                                this.connected = true;
                            } else {
                                other.up = false;

                            }
                        }
                    }


                });

                if (!cellLeft && this.x != 0 && this.getNum() < 3) {
                    this.left = game.rand() < 0.5;
                }
                if (!cellRight && this.x != game.canvas.width - game.cellSize && this.getNum() < 3) {
                    this.right = game.rand() < 0.5;
                }
                if (!cellUp && this.y != 0 && this.getNum() < 3) {
                    this.up = game.rand() < 0.5;
                }
                if (!cellDown && this.y != game.canvas.height - game.cellSize && this.getNum() < 3) {
                    this.down = game.rand() < 0.5;
                }
            }
            this.checkFilled();
        }
        click(button) {
            if (!game.win && !this.locked && !game.paused) {

                if (button == 1) {
                    let temp = this.up;
                    this.up = this.left;
                    this.left = this.down;
                    this.down = this.right;
                    this.right = temp;
                }

                if (button == 3) {
                    let temp = this.up;
                    this.up = this.right;
                    this.right = this.down;
                    this.down = this.left;
                    this.left = temp;
                }

                game.cells.forEach(cell => {
                    cell.filled = 0;
                });
                game.cells.forEach(cell => {
                    cell.checkFilled();
                });
                game.checkWin();
            }
        }
        checkFilled() {

            const currentFilled = this.filled;
            if (this.x != 0 || this.y != 0) this.filled = 0;
            if (this.source != 0) this.filled = this.source;
            game.cells.forEach(cell => {
                if (!this.filled && this.left && this.x == cell.x + game.cellSize && this.y == cell.y) {
                    if (cell.right) this.filled = cell.filled;
                }
                if (!this.filled && this.right && this.x == cell.x - game.cellSize && this.y == cell.y) {
                    if (cell.left) this.filled = cell.filled;
                }
                if (!this.filled && this.up && this.y == cell.y + game.cellSize && this.x == cell.x) {
                    if (cell.down) this.filled = cell.filled;
                }
                if (!this.filled && this.down && this.y == cell.y - game.cellSize && this.x == cell.x) {
                    if (cell.up) this.filled = cell.filled;
                }
            });
            if (this.filled != 0 && !currentFilled) {
                game.cells.forEach(cell => {
                    cell.checkFilled();
                })
            }
            this.draw();
        }
        shuffle() {
            const max = Math.floor(Math.random() * 3);
            for (var i = 0; i <= max; i++) {
                this.click(1);
            }
        }
        draw() {
            game.ctx.clearRect(this.x, this.y, game.cellSize, game.cellSize);
            if (this.locked) {
                game.ctx.fillStyle = "yellow";
                game.ctx.fillRect(this.x, this.y, game.cellSize, game.cellSize);
            }
            if (game.win) {
                game.ctx.fillStyle = "#ccffcc";
                game.ctx.fillRect(this.x, this.y, game.cellSize, game.cellSize);
            }

            if (!game.win) {
                game.ctx.strokeStyle = "black";
                game.ctx.lineWidth = 2;
                game.ctx.strokeRect(this.x + 1, this.y + 1, game.cellSize - 2, game.cellSize - 2);
            }

            game.ctx.fillStyle = "#555";

            if (this.filled == 1) game.ctx.fillStyle = "#0060ff";
            if (this.filled == 2) game.ctx.fillStyle = "#008800";
            if (this.filled == 3) game.ctx.fillStyle = "red";
            if (this.filled == 4) game.ctx.fillStyle = "orange";
            if (this.filled == 5) game.ctx.fillStyle = "purple";

            if (this.getNum() == 1 && this.source == 0) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.pipeSize * 1 / 2, 0, 2 * Math.PI);
                game.ctx.fill();
            }
            if (this.getNum() > 1) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.pipeSize / 2, 0, 2 * Math.PI);
                game.ctx.fill();
            }
            if (this.up) {
                game.ctx.fillRect(this.x + game.cellSize / 2 - game.pipeSize / 2, this.y, game.pipeSize, game.cellSize / 2);
            }
            if (this.down) {
                game.ctx.fillRect(this.x + game.cellSize / 2 - game.pipeSize / 2, this.y + game.cellSize / 2, game.pipeSize, game.cellSize / 2);
            }
            if (this.left) {
                game.ctx.fillRect(this.x, this.y + game.cellSize / 2 - game.pipeSize / 2, game.cellSize / 2, game.pipeSize);
            }
            if (this.right) {
                game.ctx.fillRect(this.x + game.cellSize / 2, this.y + game.cellSize / 2 - game.pipeSize / 2, game.cellSize / 2, game.pipeSize);
            }
            if (this.source != 0) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + game.cellSize / 2, this.y + game.cellSize / 2, game.sourceSize, 0, 2 * Math.PI);
                game.ctx.fill();
            }

            /*
            if (game.win) {
                game.ctx.textAlign = "center";
                game.ctx.textBaseline = "middle";
                game.ctx.font = "64px Arial ";
                game.ctx.fillStyle = "#222";
                game.ctx.fillText("YOU WIN!", game.canvas.width / 2, game.canvas.height / 2);
                game.ctx.textAlign = "left";
                game.ctx.textBaseline = "top"
            }
                */
        }
    }

    const game = {

        init() {
            this.canvas = document.getElementById("canvas");
            this.canvas.style.backgroundColor = "#f0f0f0";
            this.canvas.style.borderStyle = "solid";
            this.canvas.width = 500;
            this.canvas.height = 500;
            this.ctx = this.canvas.getContext("2d");

            this.boardSize = 5;
            this.numSources = 1;

            this.random();

            // this.custom(386787, 5, 5);
            //this.custom(488237, 8, 3);
        },

        random() {
            const seed = Math.floor(Math.random() * 1000000);
            this.new(seed);
        },

        new(seed) {
            this.seed = seed;
            //this.seed = 902221;
            //this.seed = 876661;
            //this.seed = 778535;
            //this.seed = 562036;

            this.rand = this.mulberry32(this.seed);
            this.cells = [];
            this.win = false;
            this.cellSize = Math.floor(this.canvas.width / this.boardSize);
            this.pipeSize = Math.floor(this.cellSize * 0.3);
            this.sourceSize = game.cellSize * 0.25;
            this.canvas.width = Math.floor(this.canvas.width / this.boardSize) * this.boardSize;
            this.canvas.height = Math.floor(this.canvas.height / this.boardSize) * this.boardSize;
            this.autoSolve = false;

            document.getElementById("seed_input").value = this.seed;
            document.getElementById("seed_display").innerHTML = "SEED: " + this.seed;
            document.getElementById("size").value = this.boardSize;
            document.getElementById("sources").value = this.numSources;

            const max = this.boardSize * this.boardSize;
            const nums = new Set();

            while (nums.size < this.numSources) {
                nums.add(Math.floor(this.rand() * max));
            }

            [this.sourceNum1, this.sourceNum2, this.sourceNum3, this.sourceNum4, this.sourceNum5] = [...nums];

            this.paused = false;
            for (i = 0; i <= this.boardSize - 1; i++) {
                for (j = 0; j <= this.boardSize - 1; j++) {
                    this.cell = new Cell(this.cellSize * i, this.cellSize * j);
                }
            }
            this.cells.forEach(cell => {
                cell.checkFilled();
            });

            this.repeatNum = 0;

            this.checkAllFilledCreate();

            game.cells.forEach(cell => {
                cell.leftStart = cell.left;
                cell.rightStart = cell.right;
                cell.upStart = cell.up;
                cell.downStart = cell.down;
            });
            this.cells.forEach(cell => {
                cell.shuffle();
                cell.draw();
            });
            this.canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });
            this.canvas.onmousedown = e => {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                if (e.which == 1 || e.which == 3) {
                    this.cells.forEach(cell => {
                        if (x >= cell.x && x <= cell.x + game.cellSize && y >= cell.y && y <= cell.y + game.cellSize) {
                            cell.click(e.which);
                        }
                    });
                }
                if (e.which == 2) {
                    this.cells.forEach(cell => {
                        if (x >= cell.x && x <= cell.x + game.cellSize && y >= cell.y && y <= cell.y + game.cellSize) {
                            cell.locked = !cell.locked;
                            cell.draw();
                        }
                    });
                }
            }


            this.startTimer();
            //this.auto();
        },

        reset() {
            this.win = false;
            this.paused = false;
            document.getElementById("pause").innerHTML = "PAUSE";
            this.cells.forEach(cell => {
                cell.left = cell.leftStart;
                cell.right = cell.rightStart;
                cell.up = cell.upStart;
                cell.down = cell.downStart;
                cell.locked = false;
            });
            this.cells.forEach(cell => {
                cell.shuffle();
                cell.checkFilled();
                cell.draw();
            });
            this.startTimer();

        },

        startTimer() {
            clearInterval(this.timeInterval);
            this.timeInterval = null;
            this.time = 0;
            document.getElementById("timer").innerHTML = "TIME: 0.00";

            if (!this.win) {
                this.timeInterval = setInterval(() => {
                    if (!game.paused) this.time += .01;

                    const totalSeconds = this.time;

                    // 1. Extract units using Floor and Modulo
                    const min = Math.floor(totalSeconds / 60);
                    const sec = Math.floor(totalSeconds % 60);
                    const rem = Math.floor((totalSeconds % 1) * 100);

                    // 2. Format with padStart (ensures 2 digits with a leading zero)
                    const displayMin = String(min).padStart(2, '0');
                    const displaySec = String(sec).padStart(2, '0');
                    const displayRem = String(rem).padStart(2, '0');

                    // 3. Update UI using Template Literals
                    document.getElementById("timer").innerHTML = `TIME: ${displayMin}:${displaySec}.${displayRem}`;

                }, 10);
            }
        },

        mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        },

        checkAllFilledCreate() {

            let allfilled = true;
            this.cells.forEach(cell => {
                this.cells.forEach(other => {
                    if (cell.filled == 0) {
                        allfilled = 0;
                        if (other.filled != 0 && (other.source == 0 || other.getNum() == 0) && other.getNum() < 3 && cell.x == other.x + this.cellSize && cell.y == other.y) {
                            cell.left = true;
                            other.right = true;
                        }
                        else if (other.filled != 0 && (other.source == 0 || other.getNum() == 0) && other.getNum() < 3 && cell.x == other.x - this.cellSize && cell.y == other.y) {
                            cell.right = true;
                            other.left = true;
                        }
                        else if (other.filled != 0 && (other.source == 0 || other.getNum() == 0) && other.getNum() < 3 && cell.y == other.y + this.cellSize && cell.x == other.x) {
                            cell.up = true;
                            other.down = true;
                        }
                        else if (other.filled != 0 && (other.source == 0 || other.getNum() == 0) && other.getNum() < 3 && cell.y == other.y - this.cellSize && cell.x == other.x) {
                            cell.down = true;
                            other.up = true;
                        }
                        this.cells.forEach(c => {
                            c.checkFilled();
                        });
                    }
                });
                this.cells.forEach(c => {
                    c.checkFilled();
                });
            });

            this.repeatNum++;
            if (!allfilled) {
                if (this.repeatNum < 100) {
                    this.checkAllFilledCreate();
                } else {
                    //console.log("Impossible");
                    //this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }
        },

        checkWin() {

            let win = true;

            this.cells.forEach(cell => {
                if (cell.filled == 0 && cell.getNum() > 0) win = false;
                this.cells.forEach(other => {
                    if (cell.left && !other.right && cell.x == other.x + this.cellSize && cell.y == other.y) {
                        win = false;
                    }
                    if (cell.right && !other.left && cell.x == other.x - this.cellSize && cell.y == other.y) {
                        win = false;
                    }
                    if (cell.up && !other.down && cell.x == other.x && cell.y == other.y + this.cellSize) {
                        win = false;
                    }
                    if (cell.down && !other.up && cell.x == other.x && cell.y == other.y - this.cellSize) {
                        win = false;
                    }
                })

                if (cell.x == 0 && cell.left || cell.y == 0 && cell.up || cell.x == this.canvas.width - this.cellSize && cell.right || cell.y == this.canvas.height - this.cellsize) win = false;
            });

            if (win) {
                this.win = true;
                this.cells.forEach(cell => {
                    cell.draw();
                });
                clearInterval(this.timeInterval);
                this.timeInterval = null;
            }
        },

        pause() {
            if (!this.win) {
                this.paused = !this.paused;
                if (this.paused) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    document.getElementById("pause").innerHTML = "RESUME";

                    this.ctx.textAlign = "center";
                    this.ctx.textBaseline = "middle";
                    this.ctx.font = "40px Arial ";
                    this.ctx.fillStyle = "black";
                    this.ctx.fillText("PAUSED", this.canvas.width / 2, this.canvas.height / 2);
                    this.ctx.textAlign = "left";
                    this.ctx.textBaseline = "top"
                } else {
                    this.cells.forEach(cell => {
                        cell.draw();
                        document.getElementById("pause").innerHTML = "PAUSE";
                    });
                }
            }
        },

        boardSizeChange(val) {
            this.boardSize = val;
            this.new(game.seed);
        },

        numSourcesChange(val) {
            this.numSources = val;
            this.new(game.seed);
        },

        seedSelect() {

            let seed = document.getElementById("seed_input").value;
            seed = Math.round(seed);

            if (seed > 0 && seed < 1000000000) this.new(seed);
        },

        custom(seed, size, sources) {
            this.boardSize = size;
            this.numSources = sources;

            this.new(seed);
        },

        solve() {
            if (this.autoSolve) {
                this.cells.forEach(cell => {

                    if (cell.x == 0 && cell.y != 0 && cell.y != this.canvas.height - this.cellSize) {
                        if (cell.getNum() == 3) {
                            cell.up = true;
                            cell.right = true;
                            cell.down = true;
                            cell.left = false;
                        }

                        if (cell.getNum() == 2 && (this.up && this.down || this.left && this.right)) {
                            cell.up = true;
                            cell.down = true;
                            cell.left = false;
                            cell.right = false;
                        }
                    }

                    cell.draw();
                    this.checkWin();
                });

                if (!this.win) {
                    setTimeout(() => {
                        console.log("test");
