<!DOCTYPE html>
<html>

<style>
    #wrapper {
        width: fit-content;
        margin: 20px auto;
    }

    body {
        font-size: 28px;
    }

    button {
        font-size: 24px;
    }

    #seed,
    #timer,
    button {
        margin-right: 20px;
        margin-top: 5px;
    }
</style>

<body>

    <div id="wrapper">
        <canvas id="canvas"></canvas>

        <div>
            <span id="seed"></span>
            <span id="timer">0</span>
        </div>

        <div>
            <button onclick="game.init()">NEW</button>
            <button onclick="game.reset()">RESET</button>
        </div>
    </div>

</body>

<script>

    class cell {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.up = false;
            this.down = false;
            this.left = false;
            this.right = false;
            this.source = false;
            this.filled = false;
            this.connected = false;

            this.cellSize = 100;
            this.pipeSize = 40;

            game.cells.push(this);
        }

        getNum() {
            return this.up + this.down + this.left + this.right;
        }

        checkCells() {

            let cellLeft = false;
            let cellRight = false;
            let cellUp = false;
            let cellDown = false;

            if (this.source) {

                this.right = true;

            } else {

                game.cells.forEach(cell => {

                    //Check Left
                    if (this.x == cell.x + 100 && this.y == cell.y) {
                        cellLeft = true;
                        if (cell.right) {

                            this.left = true;
                            this.connected = true;
                        }
                    }

                    //Check Right
                    if (this.x == cell.x - 100 && this.y == cell.y) {
                        cellRight = true;
                        if (cell.left) {

                            this.right = true;
                            this.connected = true;
                        }
                    }

                    //Check Up
                    if (this.y == cell.y + 100 && this.x == cell.x) {
                        cellUp = true;
                        if (cell.down) {

                            this.up = true;
                            this.connected = true;
                        }
                    }

                    //Check Down
                    if (this.y == cell.y - 100 && this.x == cell.x) {
                        cellDown = true;
                        if (cell.up) {

                            this.down = true;
                            this.connected = true;
                        }
                    }

                });

                console.log(!cellLeft);

                if (!cellLeft && this.x != 0 && this.getNum() < 3) {
                    //this.left = Math.random() < 0.5;
                    this.left = game.rand() < 0.5;
                    
                }

                if (!cellRight && this.x != game.canvas.width - this.cellSize && this.getNum() < 3) {
                    //this.right = Math.random() < 0.5;
                    this.right = game.rand() < 0.5;
                }

                if (!cellUp && this.y != 0 && this.getNum() < 3) {
                    //this.up = Math.random() < 0.5;
                    this.up = game.rand() * 0.5;
                }

                if (!cellDown && this.y != game.canvas.height - this.cellSize && this.getNum() < 3) {
                    //this.down = Math.random() < 0.5;
                    this.down = game.rand() < 0.5;
                }

            }


            this.checkFilled();
        }

        click() {
            if (!game.win) {
                let temp = this.up;
                this.up = this.left;
                this.left = this.down;
                this.down = this.right;
                this.right = temp;

                game.cells.forEach(cell => {
                    cell.filled = false;
                });

                game.cells.forEach(cell => {
                    cell.checkFilled();
                });

                game.checkWin();
            }
        }

        checkFilled() {
            const currentFilled = this.filled;

            if (this.x != 0 || this.y != 0) this.filled = false;

            game.cells.forEach(cell => {
                if (this.left && this.x == cell.x + this.cellSize && this.y == cell.y) {
                    if (cell.right && (cell.filled || cell.source)) this.filled = true;
                }

                if (this.right && this.x == cell.x - this.cellSize && this.y == cell.y) {
                    if (cell.left && (cell.filled || cell.source)) this.filled = true;
                }

                if (this.up && this.y == cell.y + this.cellSize && this.x == cell.x) {
                    if (cell.down && (cell.filled || cell.source)) this.filled = true;
                }

                if (this.down && this.y == cell.y - this.cellSize && this.x == cell.x) {
                    if (cell.up && (cell.filled || cell.source)) this.filled = true;
                }
            });

            if (this.filled && !currentFilled) {
                game.cells.forEach(cell => {
                    cell.checkFilled();
                })
            }

            this.draw();

        }

        shuffle() {
            const max = Math.floor(Math.random() * 3);
            for (var i = 0; i <= max; i++) {
                this.click();
            }
        }

        draw() {

            game.ctx.clearRect(this.x, this.y, this.cellSize, this.cellSize);

            game.ctx.strokeStyle = "black";
            game.ctx.lineWidth = 2;
            game.ctx.strokeRect(this.x + 1, this.y + 1, this.cellSize - 2, this.cellSize - 2);

            game.ctx.fillStyle = "#333";
            if (this.filled || this.source) game.ctx.fillStyle = "#0060ff";

            if (this.getNum() == 1) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + this.cellSize / 2, this.y + this.cellSize / 2, this.pipeSize * 3 / 4, 0, 2 * Math.PI);
                game.ctx.fill();
            }

            if (this.getNum() > 1) {
                game.ctx.beginPath();
                game.ctx.arc(this.x + this.cellSize / 2, this.y + this.cellSize / 2, this.pipeSize / 2, 0, 2 * Math.PI);
                game.ctx.fill();
            }

            if (this.up) {
                game.ctx.fillRect(this.x + this.cellSize / 2 - this.pipeSize / 2, this.y, this.pipeSize, this.cellSize / 2);
            }

            if (this.down) {
                game.ctx.fillRect(this.x + this.cellSize / 2 - this.pipeSize / 2, this.y + this.cellSize / 2, this.pipeSize, this.cellSize / 2);
            }

            if (this.left) {
                game.ctx.fillRect(this.x, this.y + this.cellSize / 2 - this.pipeSize / 2, this.cellSize / 2, this.pipeSize);
            }

            if (this.right) {
                game.ctx.fillRect(this.x + this.cellSize / 2, this.y + this.cellSize / 2 - this.pipeSize / 2, this.cellSize / 2, this.pipeSize);
            }
        }
    }

    const game = {

        init() {
            this.seed = Math.floor(Math.random() * 1000000);
            this.rand = this.mulberry32(this.seed);
            this.cells = [];
            this.canvas = document.getElementById("canvas");
            this.canvas.style.backgroundColor = "white";
            this.canvas.style.borderStyle = "solid";
            this.canvas.width = 500;
            this.canvas.height = 500;
            this.ctx = this.canvas.getContext("2d");
            this.win = false;

            for (i = 0; i <= 4; i++) {
                for (j = 0; j <= 4; j++) {
                    this.cell = new cell(100 * i, 100 * j);
                }
            }

            this.cells[Math.floor(Math.random() * 15)].source = true;

            this.cells.forEach(cell => {
                cell.checkCells();
            });

            this.cells.forEach(cell => {
                cell.checkFilled();
            });

            // this.checkAllFilledCreate();

            game.cells.forEach(cell => {
                cell.leftStart = cell.left;
                cell.rightStart = cell.right;
                cell.upStart = cell.up;
                cell.downStart = cell.down;
            });

            this.cells.forEach(cell => {
                //cell.shuffle();
                cell.draw();
            });

            this.canvas.onmousedown = e => {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                this.cells.forEach(cell => {

                    if (x >= cell.x && x <= cell.x + cell.cellSize && y >= cell.y && y <= cell.y + cell.cellSize) {
                        cell.click();
                    }
                });
            }

            document.getElementById("seed").innerHTML = "SEED: " + this.seed;

            this.startTimer();
        },

        reset() {

            this.win = false;

            this.cells.forEach(cell => {
                cell.left = cell.leftStart;
                cell.right = cell.rightStart;
                cell.up = cell.upStart;
                cell.down = cell.downStart;
            });

            this.cells.forEach(cell => {
                cell.shuffle();
                cell.checkFilled();
                cell.draw();
            });



            this.startTimer();
        },

        startTimer() {

            clearInterval(this.timeInterval);
            this.timeInterval = null;

            this.time = 0;
            this.timeInterval = setInterval(() => {

                this.time += .01;
                document.getElementById("timer").innerHTML = "TIME: " + this.time.toFixed(2);;

            }, 10);
        },

        mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        },

        checkAllFilledCreate() {

            let allfilled = true;

            this.cells.forEach(cell => {

                this.cells.forEach(other => {

                    if (!cell.filled) {
                        allfilled = false;

                        if (other.filled && !other.source && other.getNum() < 3 && cell.x == other.x + cell.cellSize && cell.y == other.y) {
                            cell.left = true;
                            other.right = true;
                        }

                        else if (other.filled && !other.source && other.getNum() < 3 && cell.x == other.x - cell.cellSize && cell.y == other.y) {
                            cell.right = true;
                            other.left = true;
                        }

                        else if (other.filled && !other.source && other.getNum() < 3 && cell.y == other.y + cell.cellSize && cell.x == other.x) {
                            cell.up = true;
                            other.down = true;
                        }

                        else if (other.filled && !other.source && other.getNum() < 3 && cell.y == other.y - cell.cellSize && cell.x == other.x) {
                            cell.down = true;
                            other.up = true;
                        }

                        this.cells.forEach(c => {
                            c.checkFilled();
                        });
                    }
                });

                this.cells.forEach(c => {
                    c.checkFilled();
                });

            });

            if (!allfilled) {
                this.checkAllFilledCreate();
            }
        },

        checkWin() {

            let win = true;

            this.cells.forEach(cell => {
                if (!cell.filled) win = false;

                this.cells.forEach(other => {
                    if (cell.left && !other.right && cell.x == other.x + cell.cellSize && cell.y == other.y) {
                        win = false;
                    }

                    if (cell.right && !other.left && cell.x == other.x - cell.cellSize && cell.y == other.y) {
                        win = false;
                    }

                    if (cell.up && !other.down && cell.x == other.x && cell.y == other.y + cell.cellSize) {
                        win = false;
                    }

                    if (cell.down && !other.up && cell.x == other.x && cell.y == other.y - cell.cellSize) {
                        win = false;
                    }
                })
            });

            if (win) {
                this.win = true;

                clearInterval(this.timeInterval);
                this.timeInterval = null;

                setTimeout(() => {
                    alert("You Win!");
                }, 100);
            }
        }
    }

    game.init();

</script>

</html>
