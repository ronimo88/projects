<!DOCTYPE html>
<html>
<head>
<style>
    body {
        font-size: 28px;
        text-align: center;
    }

    #wrapper {
        display: inline-block;
        margin-top: 20px;
    }

    button {
        font-size: 24px;
        margin: 5px 20px 0 0;
    }
</style>
</head>

<body>

<div id="wrapper">
    <canvas id="canvas"></canvas>

    <div>
        <span id="seed"></span>
        <span id="timer">0</span>
    </div>

    <div>
        <button onclick="game.init()">NEW</button>
        <button onclick="game.reset()">RESET</button>
    </div>
</div>

<script>
class Cell {
    constructor(game, x, y) {
        this.game = game;
        this.x = x;
        this.y = y;

        this.connections = { up: 0, down: 0, left: 0, right: 0 };

        this.source = (x === 0 && y === 0);
        this.filled = this.source;

        this.cellSize = game.cellSize;
        this.pipeSize = game.pipeSize;
    }

    get count() {
        return Object.values(this.connections).reduce((a, b) => a + b, 0);
    }

    rotate() {
        const { up, right, down, left } = this.connections;
        this.connections = {
            up: left,
            right: up,
            down: right,
            left: down
        };
    }

    neighbors() {
        const { grid } = this.game;
        return {
            left: grid.get(this.x - this.cellSize, this.y),
            right: grid.get(this.x + this.cellSize, this.y),
            up: grid.get(this.x, this.y - this.cellSize),
            down: grid.get(this.x, this.y + this.cellSize)
        };
    }

    click() {
        if (this.game.win) return;

        this.rotate();
        this.game.recalculateFlow();
        this.game.checkWin();
    }

    shuffle() {
        const turns = Math.floor(Math.random() * 4);
        for (let i = 0; i < turns; i++) this.rotate();
    }

    draw(ctx) {
        const { cellSize, pipeSize } = this;

        ctx.clearRect(this.x, this.y, cellSize, cellSize);

        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x + 1, this.y + 1, cellSize - 2, cellSize - 2);

        ctx.fillStyle = (this.filled || this.source) ? "#0060ff" : "#333";

        const cx = this.x + cellSize / 2;
        const cy = this.y + cellSize / 2;

        ctx.beginPath();
        ctx.arc(cx, cy, this.count === 1 ? pipeSize * 0.75 : pipeSize / 2, 0, Math.PI * 2);
        ctx.fill();

        if (this.connections.up)
            ctx.fillRect(cx - pipeSize / 2, this.y, pipeSize, cellSize / 2);

        if (this.connections.down)
            ctx.fillRect(cx - pipeSize / 2, cy, pipeSize, cellSize / 2);

        if (this.connections.left)
            ctx.fillRect(this.x, cy - pipeSize / 2, cellSize / 2, pipeSize);

        if (this.connections.right)
            ctx.fillRect(cx, cy - pipeSize / 2, cellSize / 2, pipeSize);
    }
}

const game = {
    size: 5,
    cellSize: 100,
    pipeSize: 40,

    init() {
        this.seed = Math.floor(Math.random() * 1e6);
        this.rand = this.mulberry32(this.seed);

        this.canvas = document.getElementById("canvas");
        this.canvas.width = this.canvas.height = this.size * this.cellSize;
        this.ctx = this.canvas.getContext("2d");

        this.grid = new Map();
        this.cells = [];
        this.win = false;

        // Create grid
        for (let x = 0; x < this.size; x++) {
            for (let y = 0; y < this.size; y++) {
                const cell = new Cell(this, x * this.cellSize, y * this.cellSize);
                this.cells.push(cell);
                this.grid.set(this.key(cell.x, cell.y), cell);
            }
        }

        this.generateSolution();
        this.storeSolution();
        this.shuffle();

        this.canvas.onclick = e => this.handleClick(e);

        document.getElementById("seed").textContent = "SEED: " + this.seed;
        this.startTimer();
        this.draw();
    },

    key(x, y) {
        return `${x},${y}`;
    },

    get(x, y) {
        return this.grid.get(this.key(x, y));
    },

    handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / this.cellSize) * this.cellSize;
        const y = Math.floor((e.clientY - rect.top) / this.cellSize) * this.cellSize;

        const cell = this.get(x, y);
        if (cell) cell.click();
        this.draw();
    },

    generateSolution() {
        const stack = [this.get(0, 0)];
        const visited = new Set([this.key(0, 0)]);

        while (stack.length) {
            const current = stack.pop();
            const dirs = ["up", "down", "left", "right"].sort(() => this.rand() - 0.5);

            for (let dir of dirs) {
                const nx = current.x + (dir === "left" ? -this.cellSize : dir === "right" ? this.cellSize : 0);
                const ny = current.y + (dir === "up" ? -this.cellSize : dir === "down" ? this.cellSize : 0);

                const next = this.get(nx, ny);
                if (!next || visited.has(this.key(nx, ny))) continue;

                current.connections[dir] = 1;
                next.connections[this.opposite(dir)] = 1;

                visited.add(this.key(nx, ny));
                stack.push(next);
            }
        }
    },

    opposite(dir) {
        return { up: "down", down: "up", left: "right", right: "left" }[dir];
    },

    storeSolution() {
        this.cells.forEach(c => c.start = { ...c.connections });
    },

    shuffle() {
        this.cells.forEach(c => {
            c.connections = { ...c.start };
            c.shuffle();
        });
        this.recalculateFlow();
    },

    reset() {
        this.win = false;
        this.shuffle();
        this.startTimer();
        this.draw();
    },

    recalculateFlow() {
        this.cells.forEach(c => c.filled = false);

        const start = this.get(0, 0);
        start.filled = true;

        const queue = [start];

        while (queue.length) {
            const cell = queue.shift();
            const neighbors = cell.neighbors();

            for (let dir in neighbors) {
                const next = neighbors[dir];
                if (!next) continue;

                if (
                    cell.connections[dir] &&
                    next.connections[this.opposite(dir)] &&
                    !next.filled
                ) {
                    next.filled = true;
                    queue.push(next);
                }
            }
        }
    },

    checkWin() {
        if (this.cells.every(c => c.filled)) {
            this.win = true;
            clearInterval(this.timer);

            setTimeout(() => alert("You Win!"), 100);
        }
    },

    draw() {
        this.cells.forEach(c => c.draw(this.ctx));
    },

    startTimer() {
        clearInterval(this.timer);
        this.time = 0;

        this.timer = setInterval(() => {
            this.time += 0.01;
            document.getElementById("timer").textContent = "TIME: " + this.time.toFixed(2);
        }, 10);
    },

    mulberry32(a) {
        return () => {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }
};

game.init();
</script>

</body>
</html>
