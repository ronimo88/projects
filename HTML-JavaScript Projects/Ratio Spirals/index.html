<html>

<head>
    <title>Ratio Spirals</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <script src="math.js"></script>
</head>

<body onload="load()">

    <div id="wrapper">
        <div>
            <span id="title">Ratio Spirals</span>
            <a id="yt_link" href="https://www.youtube.com/watch?v=sj8Sg8qnjOg" target="_blank">The Golden Ratio -
                Numberphile</a>
        </div>

        <div id="main">


            <div id="menu">

                <div>
                    <button id="undo_button" disabled onclick="undo()">Undo</button>
                    <button id="redo_button" disabled onclick="redo()">Redo</button>
                    <button style="float:right" onclick="setDefaults()">Defaults</button>
                    <button style="float:right; margin-right:5px" onclick="randomValues()">Random</button>
                </div>

                <div class="line"></div>

                <label class="label1" for="preset">Preset</label>
                <select id="preset" oninput="presetChange(this.value)" onchange="addValues()">
                    <option value="None">None</option>
                </select>

                <div>
                    <label class="label1" id="number_label" for="number">Number</label>
                    <input id="number" type="text" oninput="numChange(this.value)" onchange="addValues(); setNumber()">
                </div>

                <div>
                    <label class="label1" for="separation">Separation</label>
                    <input id="separation" type="number" step=0.1 oninput="separationChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="num_circles">Number of Circles</label>
                    <input id="num_circles" type="number" step=1 min="0" oninput="numCirclesChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="circle_size">Circle Size</label>
                    <input id="circle_size" type="number" step=1 min="0" oninput="circleSizeChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="outline_size">Outline Size</label>
                    <input id="outline_size" type="number" step=1 min="0" oninput="outlineSizeChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="circle_color">Circle Color</label>
                    <input id="circle_color" type="color" step=1 oninput="circleColorChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="outline_color">Outline Color</label>
                    <input id="outline_color" type="color" step=1 oninput="outlineColorChange(this.value)"
                        onchange="addValues()">
                </div>

                <div>
                    <label class="label1" for="background_color">Background Color</label>
                    <input id="background_color" type="color" step=1 oninput="backgroundColorChange(this.value)"
                        onchange="addValues()">
                </div>

                <div class="line"></div>

                <div>
                    <label class="label2" for="run_step">Speed</label>
                    <input id="run_step" type="number" step="1" min="-100" max="100"
                        onchange="speedChange(this.value); addValues()">

                    <button id="run_button" onclick="run()">Run</button>
                </div>

                <div class="line"></div>

                <div>
                    <label class="label2" for="image_name">Name</label>
                    <input id="image_name" type="text" onchange="imageNameChange(this.value)">
                </div>

                <div>
                    <button id="download_button" onclick="downloadValues()">Download Custom</button>
                    <button form="" onclick="fileUpload()">Upload Custom</button>
                </div>

                <div>
                    <button id="saveButton" onclick="saveImage()">Save Image</button>
                </div>

                <input type="file" id="file_upload" name="uploadedFiles" accept="application/json" style="display:none">

            </div>

            <div id="canvas_wrapper">
                <canvas id="canvas"></canvas>
            </div>

        </div>
    </div>

</body>

</html>
